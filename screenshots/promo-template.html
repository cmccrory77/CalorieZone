<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1290px;
    height: 2796px;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
  }

  .slide {
    width: 1290px;
    height: 2796px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  .slide.bg-1 {
    background: linear-gradient(170deg, #f0f9f0 0%, #d4edda 35%, #a8d8b0 70%, #6cc070 100%);
  }
  .slide.bg-2 {
    background: linear-gradient(170deg, #fff8ef 0%, #ffe8c5 35%, #ffd699 70%, #ffb347 100%);
  }
  .slide.bg-3 {
    background: linear-gradient(170deg, #eef6ff 0%, #cce3ff 35%, #99c9ff 70%, #5ea8f5 100%);
  }

  .text-area {
    padding: 100px 80px 0;
    text-align: center;
    z-index: 2;
  }

  .headline {
    font-size: 88px;
    font-weight: 900;
    line-height: 1.05;
    color: #1a1a2e;
    letter-spacing: -3px;
    margin-bottom: 20px;
  }

  .subtext {
    font-size: 36px;
    font-weight: 600;
    color: rgba(26, 26, 46, 0.5);
    line-height: 1.35;
    max-width: 900px;
    margin: 0 auto;
  }

  .phone-container {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 2;
  }

  .phone-frame {
    width: 980px;
    height: 2060px;
    background: #1a1a1e;
    border-radius: 80px;
    padding: 16px;
    box-shadow:
      0 80px 160px rgba(0,0,0,0.2),
      0 30px 60px rgba(0,0,0,0.12),
      inset 0 1px 0 rgba(255,255,255,0.08);
    position: relative;
    margin-bottom: -80px;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 66px;
    overflow: hidden;
    background: #fff;
  }

  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    display: block;
  }

  .phone-notch {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 38px;
    background: #1a1a1e;
    border-radius: 0 0 22px 22px;
    z-index: 10;
  }

  .dynamic-island {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 44px;
    background: #000;
    border-radius: 24px;
    z-index: 10;
  }

  .decorative-circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.08;
    background: white;
  }

  .c1 { width: 600px; height: 600px; top: -150px; right: -200px; }
  .c2 { width: 400px; height: 400px; bottom: 500px; left: -150px; }
  .c3 { width: 250px; height: 250px; top: 600px; right: -80px; }
</style>
</head>
<body>
  <div id="slide" class="slide bg-1">
    <div class="decorative-circle c1"></div>
    <div class="decorative-circle c2"></div>
    <div class="decorative-circle c3"></div>
    <div class="text-area">
      <h1 id="headline" class="headline"></h1>
      <p id="subtext" class="subtext"></p>
    </div>
    <div class="phone-container">
      <div class="phone-frame">
        <div class="dynamic-island"></div>
        <div class="phone-screen">
          <img id="screenshot" src="" alt="App Screenshot">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
